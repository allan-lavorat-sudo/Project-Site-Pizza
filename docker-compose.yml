version: '3.8'

services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pizza-delivery-db
    environment:
      SA_PASSWORD: "YourPassword123!"
      ACCEPT_EULA: "Y"
      MSSQL_DB: PizzaDeliveryDB
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pizza-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourPassword123! -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pizza-delivery-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=PizzaDeliveryDB;User Id=sa;Password=YourPassword123!;Encrypt=false;"
      JwtSettings__Secret: "your-super-secret-key-change-in-production-min-32-chars"
      JwtSettings__Issuer: "pizzadelivery.api"
      JwtSettings__Audience: "pizzadelivery.clients"
      IfoodSettings__ApiBaseUrl: "https://api.ifood.com.br"
    ports:
      - "5000:80"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - pizza-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pizza-delivery-web
    environment:
      NEXT_PUBLIC_API_URL: http://backend:80/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pizza-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # Admin Panel
  admin:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: pizza-delivery-admin
    environment:
      NEXT_PUBLIC_API_URL: http://backend:80/api/v1
    ports:
      - "3001:3000"
    depends_on:
      - backend
    networks:
      - pizza-network
    volumes:
      - ./admin-panel:/app
      - /app/node_modules
      - /app/.next

volumes:
  sql_data:

networks:
  pizza-network:
    driver: bridge
